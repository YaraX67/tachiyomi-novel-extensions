name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build extensions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleRelease

      - name: Collect APKs & generate index
        run: |
          mkdir -p repo/apk repo/icon
          find . -name "*.apk" -not -path "./repo/*" -exec cp {} repo/apk/ \;
          python3 scripts/generate_index.py

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: repo
          publish_branch: repo
          keep_files: true
